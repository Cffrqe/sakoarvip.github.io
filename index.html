<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Banner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: transparent;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  .banner-container {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100vw;
    height: 52px;
    display: flex;
    align-items: stretch;
    animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
    transform: translateY(100%);
  }

  @keyframes slideUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Glassmorphism base */
  .banner-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, 
      rgba(15, 15, 25, 0.95) 0%, 
      rgba(20, 20, 40, 0.92) 50%, 
      rgba(15, 15, 25, 0.95) 100%
    );
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255, 255, 255, 0.08);
  }

  /* Animated accent line on top */
  .accent-line {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, 
      #6c5ce7, #a855f7, #ec4899, #f43f5e, #f97316, #eab308, #22c55e, #06b6d4, #3b82f6, #6c5ce7
    );
    background-size: 300% 100%;
    animation: gradientShift 6s linear infinite;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }

  /* Glow effect */
  .accent-line::after {
    content: '';
    position: absolute;
    inset: 0;
    background: inherit;
    background-size: inherit;
    animation: inherit;
    filter: blur(8px);
    opacity: 0.6;
  }

  .banner-content {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    width: 100%;
    height: 100%;
    padding: 0 20px;
    gap: 0;
  }

  /* Stream Title Section */
  .title-section {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-right: 24px;
    border-right: 1px solid rgba(255, 255, 255, 0.1);
    height: 60%;
    flex-shrink: 0;
  }

  .live-dot {
    width: 8px;
    height: 8px;
    background: #ef4444;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
    box-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .stream-title {
    color: #ffffff;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3px;
    white-space: nowrap;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
  }

  /* Scrolling Ticker */
  .ticker-section {
    flex: 1;
    overflow: hidden;
    position: relative;
    margin: 0 24px;
    height: 100%;
    display: flex;
    align-items: center;
    mask-image: linear-gradient(90deg, transparent, black 5%, black 95%, transparent);
    -webkit-mask-image: linear-gradient(90deg, transparent, black 5%, black 95%, transparent);
  }

  .ticker-track {
    display: flex;
    align-items: center;
    animation: scroll 30s linear infinite;
    gap: 50px;
    white-space: nowrap;
  }

  @keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .ticker-item {
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(255, 255, 255, 0.7);
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .ticker-item .separator {
    color: rgba(168, 85, 247, 0.4);
    font-size: 8px;
    margin: 0 10px;
  }

  /* Social Section */
  .social-section {
    display: flex;
    align-items: center;
    gap: 20px;
    padding-left: 24px;
    border-left: 1px solid rgba(255, 255, 255, 0.1);
    height: 60%;
    flex-shrink: 0;
  }

  .social-item {
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(255, 255, 255, 0.85);
    font-size: 13px;
    font-weight: 600;
    transition: all 0.3s ease;
    white-space: nowrap;
  }

  .social-item svg {
    flex-shrink: 0;
    filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.15));
  }

  .social-item.discord svg {
    color: #5865F2;
    filter: drop-shadow(0 0 6px rgba(88, 101, 242, 0.4));
  }

  .social-item.youtube svg {
    color: #FF0000;
    filter: drop-shadow(0 0 6px rgba(255, 0, 0, 0.4));
  }

  .social-item .social-text {
    background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.7));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Status Rotator */
  .status-section {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-left: 24px;
    border-left: 1px solid rgba(255, 255, 255, 0.1);
    height: 60%;
    flex-shrink: 0;
    min-width: 180px;
  }

  .status-icon {
    width: 6px;
    height: 6px;
    background: #22c55e;
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
    flex-shrink: 0;
  }

  .status-rotator {
    position: relative;
    height: 20px;
    overflow: hidden;
    flex: 1;
  }

  .status-text {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    color: rgba(255, 255, 255, 0.6);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    opacity: 0;
    transform: translateY(20px);
    animation: statusRotate 12s ease-in-out infinite;
  }

  .status-text:nth-child(1) { animation-delay: 0s; }
  .status-text:nth-child(2) { animation-delay: 3s; }
  .status-text:nth-child(3) { animation-delay: 6s; }
  .status-text:nth-child(4) { animation-delay: 9s; }

  @keyframes statusRotate {
    0% { opacity: 0; transform: translateY(20px); }
    5% { opacity: 1; transform: translateY(0); }
    20% { opacity: 1; transform: translateY(0); }
    25% { opacity: 0; transform: translateY(-20px); }
    100% { opacity: 0; transform: translateY(-20px); }
  }

  /* Floating particles */
  .particles {
    position: absolute;
    inset: 0;
    z-index: 1;
    overflow: hidden;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(168, 85, 247, 0.3);
    border-radius: 50%;
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-60px) translateX(20px); opacity: 0; }
  }
</style>
</head>
<body>

<!-- ============================================
     SETTINGS - Change these values as needed!
     ============================================ -->
<script>
  // ── STREAM SETTINGS ──
  const STREAM_TITLE    = "Playing with GeenSurge, and Rivyn!";
  const YOUTUBE_NAME    = "@AcuteBunny";
  const DISCORD_INVITE  = "discord.gg/casting";

  // ── STATUS MESSAGES (rotates through these) ──
  const STATUS_MESSAGES = [
    "🎮 Thanks for watching!",
    "💬 Chat is active!",
    "⭐ Don't forget to follow!",
    "🔔 Turn on notifications!"
  ];

  // ── TICKER MESSAGES (scrolling bar) ──
  const TICKER_MESSAGES = [
    "Welcome to the stream!",
    "Join the community on Discord",
    "Like & Subscribe on YouTube",
    "Type in chat, say hello!",
    "Follow for more content",
    "Thanks for all the support!"
  ];
</script>

<div class="banner-container">
  <div class="banner-bg"></div>
  <div class="accent-line"></div>

  <div class="particles" id="particles"></div>

  <div class="banner-content">
    <!-- Live indicator + Stream Title -->
    <div class="title-section">
      <div class="live-dot"></div>
      <div class="stream-title" id="streamTitle"></div>
    </div>

    <!-- Scrolling Ticker -->
    <div class="ticker-section">
      <div class="ticker-track" id="tickerTrack"></div>
    </div>

    <!-- Social Links -->
    <div class="social-section">
      <!-- Discord -->
      <div class="social-item discord">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.9555 2.4189-2.1569 2.4189zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.4189-2.1568 2.4189z"/>
        </svg>
        <span class="social-text" id="discordText"></span>
      </div>

      <!-- YouTube -->
      <div class="social-item youtube">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
        </svg>
        <span class="social-text" id="youtubeText"></span>
      </div>
    </div>

    <!-- Rotating Status -->
    <div class="status-section">
      <div class="status-icon"></div>
      <div class="status-rotator" id="statusRotator"></div>
    </div>
  </div>
</div>

<script>
  // Populate stream title
  document.getElementById('streamTitle').textContent = STREAM_TITLE;

  // Populate socials
  document.getElementById('discordText').textContent = DISCORD_INVITE;
  document.getElementById('youtubeText').textContent = YOUTUBE_NAME;

  // Populate status rotator
  const statusRotator = document.getElementById('statusRotator');
  STATUS_MESSAGES.forEach(msg => {
    const div = document.createElement('div');
    div.className = 'status-text';
    div.textContent = msg;
    statusRotator.appendChild(div);
  });

  // Build ticker (duplicate for seamless loop)
  const tickerTrack = document.getElementById('tickerTrack');
  function buildTicker() {
    let html = '';
    for (let r = 0; r < 2; r++) {
      TICKER_MESSAGES.forEach((msg, i) => {
        html += `<span class="ticker-item">${msg}</span>`;
        if (i < TICKER_MESSAGES.length - 1 || r === 0) {
          html += `<span class="ticker-item separator">◆</span>`;
        }
      });
    }
    tickerTrack.innerHTML = html;
  }
  buildTicker();

  // Create particles
  const particlesContainer = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.bottom = '0px';
    p.style.animationDuration = (3 + Math.random() * 4) + 's';
    p.style.animationDelay = (Math.random() * 6) + 's';
    p.style.width = (1 + Math.random() * 2) + 'px';
    p.style.height = p.style.width;
    p.style.background = `hsla(${260 + Math.random() * 40}, 70%, 65%, ${0.15 + Math.random() * 0.2})`;
    particlesContainer.appendChild(p);
  }
</script>

</body>
</html>
